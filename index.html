<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0e1a" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Game Portal" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Poppins:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>Game Portal — 無料ミニゲーム集</title>
    <meta
      name="description"
      content="登録不要・無料で遊べるミニゲーム集。2048・スネーク・神経衰弱など。スマホ対応。"
    />
    <!-- OGP (各ページで Seo コンポーネントが上書き) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Game Portal — 無料ミニゲーム集" />
    <meta
      property="og:description"
      content="登録不要・無料で遊べるミニゲーム集。スマホでもPCでも。"
    />
    <meta property="og:image" content="/og-default.svg" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 初期描画前にテーマを適用してちらつきを防ぐ (src/core/lib/theme.ts と同じ 'gp-theme' キー)
      (function () {
        try {
          var t = localStorage.getItem('gp-theme') || 'system'
          var dark =
            t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
